[env:esp32-s3-n16r8]
platform = espressif32 @ 6.3.2
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor speed
monitor_speed = 115200

; Flash and PSRAM configurations for N16R8
; N16 = 16MB Flash
; R8 = 8MB Octal PSRAM (OPI)
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = opi_opi

; Enable PSRAM and other necessary flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    fastled/FastLED @ ^3.6.0
    
    ; If using the Native USB port (label 'USB'), uncomment the following lines:
    ; -DARDUINO_USB_CDC_ON_BOOT=1 
    ; -DARDUINO_USB_MODE=1
